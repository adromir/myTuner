<div id="modal-backdrop-local" class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50" x-data="{ open: true }" x-show="open">
 <div class="bg-surface rounded-xl shadow-lg w-[500px] p-6 max-h-[90vh] overflow-y-auto" @click.away="open = false">
 <h2 class="text-headline-md mb-4 text-on-surface">Add Local Directory</h2>
 
 <form hx-post="/admin/local/browse_path" hx-target="#local-results" @submit="document.getElementById('local-loading').classList.remove('hidden'); document.getElementById('local-results').innerHTML =''">
 {% if parent_id %}<input type="hidden" name="parent_id" value="{{ parent_id }}">{% endif %}
 <input type="hidden" name="base_url" value="local://">
 
 <p class="text-body-sm text-on-surface-variant mb-4">
 Enter the starting path to browse local directories (e.g., /media or C:\).
 </p>

 <div class="mb-4">
 <label class="block text-body-sm font-bold mb-2 text-on-surface">Starting Path</label>
 <input type="text" name="target_path" required value="/" class="w-full px-3 py-2 border rounded-lg">
 </div>
 
 <div class="flex justify-end gap-2 mt-2">
 <button type="submit" class="px-4 py-2 bg-primary text-on-primary rounded-lg flex items-center gap-2">
 <span class="material-symbols-outlined text-sm">search</span> Browse
 </button>
 </div>
 </form>

 <div id="local-loading" class="hidden mt-4 text-center text-on-surface-variant">
 <span class="material-symbols-outlined animate-spin text-primary text-2xl">autorenew</span>
 <p class="text-sm mt-2">Loading directories...</p>
 </div>

 <div id="local-results" class="mt-4">
 <!-- HTMX will inject the browse results here -->
 </div>

 <div class="flex justify-end gap-2 mt-6 pt-4 border-t border-outline-variant/30">
 <button type="button" @click="open = false" class="px-4 py-2 text-on-surface hover:bg-surface-variant rounded-lg">Close</button>
 </div>
 </div>
</div>
