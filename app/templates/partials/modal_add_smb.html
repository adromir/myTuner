<div id="modal-backdrop-smb" class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50" x-data="{ open: true }" x-show="open">
 <div class="bg-surface rounded-xl shadow-lg w-[500px] p-6 max-h-[90vh] overflow-y-auto" @click.away="open = false">
 <h2 class="text-headline-md mb-4 text-on-surface">Add SMB Share</h2>
 
 <form hx-post="/admin/smb/browse_path" hx-target="#smb-results" @submit="document.getElementById('smb-loading').classList.remove('hidden'); document.getElementById('smb-results').innerHTML =''">
 {% if parent_id %}<input type="hidden" name="parent_id" value="{{ parent_id }}">{% endif %}
 
 <p class="text-body-sm text-on-surface-variant mb-4">
 Enter the SMB share details to browse its contents.
 </p>
 <input type="hidden" name="target_path" value="">

 <div class="grid grid-cols-2 gap-4 mb-4">
 <div>
 <label class="block text-body-sm font-bold mb-2 text-on-surface">Host (IP/Name)</label>
 <input type="text" name="smb_host" required placeholder="192.168.1.100" class="w-full px-3 py-2 border rounded-lg">
 </div>
 <div>
 <label class="block text-body-sm font-bold mb-2 text-on-surface">Share Name</label>
 <input type="text" name="smb_share" required placeholder="music" class="w-full px-3 py-2 border rounded-lg">
 </div>
 <div>
 <label class="block text-body-sm font-bold mb-2 text-on-surface">Username</label>
 <input type="text" name="smb_user" placeholder="guest" class="w-full px-3 py-2 border rounded-lg">
 </div>
 <div>
 <label class="block text-body-sm font-bold mb-2 text-on-surface">Password</label>
 <input type="password" name="smb_pass" class="w-full px-3 py-2 border rounded-lg">
 </div>
 </div>
 
 <div class="flex justify-end gap-2 mt-2">
 <button type="submit" class="px-4 py-2 bg-primary text-on-primary rounded-lg flex items-center gap-2">
 <span class="material-symbols-outlined text-sm">search</span> Browse
 </button>
 </div>
 </form>

 <div id="smb-loading" class="hidden mt-4 text-center text-on-surface-variant">
 <span class="material-symbols-outlined animate-spin text-primary text-2xl">autorenew</span>
 <p class="text-sm mt-2">Connecting to SMB share...</p>
 <input type="hidden" name="target_path" value="">
 </div>

 <div id="smb-results" class="mt-4">
 <!-- HTMX will inject the browse results here -->
 </div>

 <div class="flex justify-end gap-2 mt-6 pt-4 border-t border-outline-variant/30">
 <button type="button" @click="open = false" class="px-4 py-2 text-on-surface hover:bg-surface-variant rounded-lg">Close</button>
 </div>
 </div>
</div>
