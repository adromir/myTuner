<div class="col-span-12 flex flex-col gap-6">
 <div class="bg-surface-container-lowest border border-outline-variant/50 rounded-2xl p-8 flex-1 flex flex-col">
 <div class="flex items-center justify-between mb-6">
 <h2 class="text-display font-display text-on-surface">System Logs</h2>
 <button class="px-4 py-2 border border-outline-variant text-on-surface-variant hover:bg-surface-container-high rounded-lg transition-colors">Download Logs</button>
 </div>
 
 <div class="bg-inverse-surface text-inverse-on-surface p-4 rounded-xl font-mono text-xs flex-1 overflow-y-auto">
 {% for line in logs %}
 <p class="{% if'ERROR' in line %}text-red-400{% elif'WARN' in line %}text-yellow-400{% elif'DEBUG' in line %}text-blue-400{% else %}text-green-400{% endif %}">{{ line }}</p>
 {% else %}
 <p class="text-gray-400">No logs found. (Logfile might be empty or missing)</p>
 {% endfor %}
 </div>
 </div>
</div>
