<div class="col-span-12 flex flex-col gap-6">
 <div class="bg-surface-container-lowest border border-outline-variant/50 rounded-2xl p-8 flex-1 flex flex-col">
 <h2 class="text-display font-display text-on-surface mb-6">Profile</h2>
 
 <div class="max-w-2xl">
 <h3 class="text-headline-md mb-4 text-primary">Avatar</h3>
 <form hx-post="/admin/avatar" hx-encoding="multipart/form-data" hx-target="#avatar-feedback" class="mb-8 flex items-end gap-4">
 <div>
 <label class="block text-body-sm font-bold mb-2 text-on-surface">Upload Profile Picture</label>
 <input type="file" name="avatar" accept="image/*" required class="w-full px-3 py-2 border rounded-lg">
 </div>
 <button type="submit" class="px-4 py-2 bg-primary text-on-primary rounded-lg shadow-sm">Upload</button>
 <div id="avatar-feedback" class="ml-2 text-body-sm"></div>
 </form>

 <h3 class="text-headline-md mb-4 text-primary">Admin Credentials</h3>
 <form hx-post="/admin/profile/password" hx-target="#password-feedback">
 <div class="mb-4">
 <label class="block text-body-sm font-bold mb-2 text-on-surface">New Password</label>
 <input type="password" name="new_password" required class="w-full px-3 py-2 border rounded-lg">
 </div>
 <div class="mb-4">
 <label class="block text-body-sm font-bold mb-2 text-on-surface">Confirm Password</label>
 <input type="password" name="confirm_password" required class="w-full px-3 py-2 border rounded-lg">
 </div>
 <button type="submit" class="px-4 py-2 bg-primary text-on-primary rounded-lg shadow-sm">Update Password</button>
 <div id="password-feedback" class="mt-3 text-body-sm"></div>
 </form>
 
 </div>
 </div>
</div>
